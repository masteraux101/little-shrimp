name: planner-worker-agent

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      user_prompt:
        description: "Manual prompt for planner-worker graph"
        required: false
        type: string
      issue_number:
        description: "Issue number for writeback"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Extract issue context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload;
            const issue = payload.issue || {};
            const comment = payload.comment || {};

            const issueNumber = issue.number ? String(issue.number) : (core.getInput('issue_number') || '');
            const issueTitle = issue.title || '';
            const issueBody = issue.body || '';
            const commentBody = comment.body || '';
            const manualPrompt = core.getInput('user_prompt') || '';

            const finalPrompt = manualPrompt || [issueTitle, issueBody, commentBody].filter(Boolean).join('\n\n');
            const newRequirements = commentBody ? [commentBody] : [];

            core.setOutput('issue_number', issueNumber);
            core.setOutput('issue_title', issueTitle);
            core.setOutput('issue_body', issueBody);
            core.setOutput('user_prompt', finalPrompt);
            core.setOutput('new_requirements_json', JSON.stringify(newRequirements));

      - name: Run planner-worker graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.context.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.context.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.context.outputs.issue_body }}
          USER_PROMPT: ${{ steps.context.outputs.user_prompt }}
          NEW_REQUIREMENTS_JSON: ${{ steps.context.outputs.new_requirements_json }}
          WRITE_BACK_TO_ISSUE: "true"
        run: node --experimental-strip-types playground/langgraph-collab/index.ts
